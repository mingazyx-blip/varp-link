<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varp Lnk Pro - Cyber Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --card-glass: rgba(15, 23, 42, 0.75);
            --glow-color: rgba(59, 130, 246, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; padding: 15px; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background-color: #030712; color: #f8fafc; overflow-x: hidden;
            perspective: 1000px;
        }

        /* Dynamic Animated Cyber Background */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes bgShift { 0% { transform: scale(1); } 100% { transform: scale(1.1) rotate(2deg); } }

        .container { 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.05); 
            width: 98%; max-width: 1100px; margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .container.edit-mode {
            border: 1px solid #f59e0b;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.4);
        }

        h2 { font-size: 1.2rem; margin: 0; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); white-space: nowrap; font-weight: 700; }

        .input-group { display: flex; gap: 8px; flex: 3; min-width: 280px; flex-wrap: wrap; }
        input { 
            width: 100%; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 13px; font-family: 'Kanit'; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .input-group input { flex: 1; min-width: 120px; }
        #tagInput { flex: 0.8; background: rgba(56, 189, 248, 0.05); }
        #customImgInput { flex: 1; background: rgba(245, 158, 11, 0.05); }

        .btn-group { display: flex; gap: 5px; flex-shrink: 0; }
        button { padding: 10px 18px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; font-size: 13px; }
        #addBtn { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        #addBtn.edit-btn-active { background: linear-gradient(135deg, #d97706, #f59e0b); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        #clearInputBtn { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }

        #searchBox { flex: 1.5; min-width: 150px; background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255,255,255,0.2); }

        .filter-section {
            width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;
        }
        .bar-label { font-size: 11px; color: #64748b; margin-left: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-bar {
            width: 100%; display: flex; gap: 8px; overflow-x: auto;
            padding: 4px 0; scrollbar-width: none;
        }
        .tag-bar::-webkit-scrollbar { display: none; }
        .tag-filter {
            padding: 6px 16px; background: rgba(255,255,255,0.05); color: #94a3b8;
            border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; transition: 0.3s; display: flex; align-items: center; gap: 5px;
        }
        .tag-filter.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; box-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }
        .platform-filter.active { background: #8b5cf6; color: #fff; border-color: #8b5cf6; font-weight: 600; box-shadow: 0 0 12px rgba(139, 92, 246, 0.5); }

        #list { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 22px; width: 100%; max-width: 1250px; padding-bottom: 60px;
        }

        /* 3D Cyber Holographic Card */
        .link-item { 
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 22px; 
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 150px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.4s ease forwards;
            transition: transform 0.15s cubic-bezier(0.2, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Neon Glow According to Platform */
        .link-item[data-platform="tiktok"] { --glow: #ff0050; --glow-secondary: #00f2fe; }
        .link-item[data-platform="instagram"] { --glow: #f09433; --glow-secondary: #bc1888; }
        .link-item[data-platform="twitter"] { --glow: #1da1f2; --glow-secondary: #0f172a; }
        .link-item[data-platform="facebook"] { --glow: #1877f2; --glow-secondary: #3b5998; }
        .link-item[data-platform="youtube"] { --glow: #ff0000; --glow-secondary: #990000; }
        .link-item[data-platform="github"] { --glow: #a855f7; --glow-secondary: #6366f1; }
        .link-item[data-platform="other"] { --glow: #3b82f6; --glow-secondary: #06b6d4; }

        .link-item:hover { 
            border-color: var(--glow);
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.8), 0 0 20px 2px var(--glow);
            background: rgba(15, 23, 42, 0.85);
        }

        .link-item b { font-size: 16px; color: #f8fafc; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .badges-wrap { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        
        /* Animated Cyber Badges */
        .tag-label { 
            font-size: 9px; padding: 2px 8px; background: rgba(56, 189, 248, 0.15); color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 6px; font-weight: 600; 
        }
        .platform-label { 
            font-size: 9px; padding: 2px 8px; background: rgba(168, 85, 247, 0.15); color: #c084fc; 
            border: 1px solid rgba(168, 85, 247, 0.3); border-radius: 6px; font-weight: 600;
            animation: pulseBadge 3s infinite alternate;
        }

        @keyframes pulseBadge { 0% { opacity: 0.8; } 100% { opacity: 1; filter: drop-shadow(0 0 3px var(--glow)); } }

        .avatar-wrap { position: relative; flex-shrink: 0; width: 48px; height: 48px; }
        .avatar-img {
            width: 48px; height: 48px; border-radius: 14px; object-fit: cover;
            border: 1px solid rgba(255,255,255,0.15); background: #0f172a; display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .avatar-initial {
            width: 48px; height: 48px; border-radius: 14px;
            background: linear-gradient(135deg, var(--glow, #3b82f6), var(--glow-secondary, #8b5cf6));
            color: #fff; font-weight: 700; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px var(--glow, rgba(59, 130, 246, 0.4));
        }
        .avatar-badge {
            position: absolute; bottom: -2px; right: -2px;
            width: 14px; height: 14px; border-radius: 50%;
            background: #22c55e; border: 2px solid #0f172a;
            display: none; box-shadow: 0 0 8px #22c55e;
        }
        .avatar-wrap.has-profile .avatar-badge { display: block; }

        .click-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.08); color: #38bdf8;
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            font-weight: 600; border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .action-btns { display: flex; gap: 5px; margin-top: 15px; }
        .action-btns button { 
            padding: 8px 4px; flex: 1; font-size: 11px; border-radius: 10px; 
            background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }
        .action-btns button:hover { background: rgba(255,255,255,0.15); color: #fff; transform: translateY(-2px); }
        .open-btn { background: #3b82f6 !important; color: white !important; font-weight: 600; border: none !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: #0f172a; padding: 25px; border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3); max-width: 90%; width: 300px;
            border: 1px solid rgba(255,255,255,0.1); transform: scale(0.8); transition: 0.3s;
        }
        .modal-overlay.show .modal-card { transform: scale(1); }
        .modal-card img { width: 180px; height: 180px; border-radius: 12px; background: #fff; padding: 8px; }
        .modal-card b { color: #38bdf8; text-align: center; font-size: 16px; }

        .toast { 
            position: fixed; bottom: 30px; left: 50%; 
            transform: translate(-50%, 20px); opacity: 0;
            background: #0f172a; color: white; padding: 10px 25px; 
            border-radius: 50px; font-size: 13px; z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } } 
    </style>
</head>
<body>

<div class="bg-animate"></div>
<div id="toast" class="toast"></div>

<!-- QR Modal -->
<div class="modal-overlay" id="qrModal">
    <div class="modal-card">
        <b id="qrTitle">QR Code</b>
        <img id="qrImg" src="" alt="QR Code">
        <button id="closeQrBtn" style="background: var(--accent); color: white; width: 100%;">ปิดหน้าต่าง</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <h2 id="formHeader">⚡ Varp Lnk Pro</h2>
    <div class="input-group">
        <input type="text" id="url" placeholder="URL https://... (วางลิงก์ที่นี่)">
        <input type="text" id="name" placeholder="ชื่อรายการ (ดึงให้อัตโนมัติ)">
        <input type="text" id="tagInput" placeholder="หมวดหมู่...">
        <input type="text" id="customImgInput" placeholder="🖼️ ลิงก์รูปภาพ (เว้นได้)">
    </div>
    <div class="btn-group">
        <button id="addBtn">บันทึก</button>
        <button id="clearInputBtn">ล้าง</button>
    </div>
    <input type="text" id="searchBox" placeholder="🔍 ค้นหาเร็ว...">
</div>

<div class="filter-section">
    <div class="bar-label">📱 แยกตามแอป (Platform):</div>
    <div class="tag-bar" id="platformBar"></div>
    
    <div class="bar-label" style="margin-top: 4px;">🏷️ แยกตามหมวดหมู่ (Tag):</div>
    <div class="tag-bar" id="tagBar"></div>
</div>

<div id="list"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYlgibxWMe7bPct515waryg2duBZRiECm",
        authDomain: "my-links-505c4.firebaseapp.com",
        projectId: "my-links-505c4",
        storageBucket: "my-links-505c4.appspot.com",
        messagingSenderId: "376694144",
        appId: "1:376694144:web:31cb5856d61c0de0930d65"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allLinks = [];
    let searchTerm = "";
    let activeTag = "ทั้งหมด";
    let activePlatform = "ทั้งหมด";
    let editingId = null;

    const PLATFORM_ICONS = {
        'tiktok': '🎵 TikTok',
        'instagram': '📸 Instagram',
        'twitter': '🐦 X (Twitter)',
        'facebook': '📘 Facebook',
        'youtube': '▶️ YouTube',
        'github': '💻 GitHub',
        'other': '🌐 เว็บทั่วไป'
    };

    const showToast = (msg) => {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    };

    // Auto Fetch Title
    let fetchTimer;
    document.getElementById('url').addEventListener('input', (e) => {
        let rawUrl = e.target.value.trim();
        if (!rawUrl || editingId) return;

        if (!/^https?:\/\//i.test(rawUrl)) rawUrl = 'https://' + rawUrl;

        clearTimeout(fetchTimer);
        fetchTimer = setTimeout(async () => {
            const nameInput = document.getElementById('name');
            if (nameInput.value.trim() !== "") return;

            nameInput.placeholder = "⏳ กำลังดึงชื่อเว็บ...";
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rawUrl)}`);
                const data = await res.json();
                if (data.contents) {
                    const match = data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
                    if (match && match[1]) {
                        nameInput.value = match[1].trim();
                        showToast("✨ ดึงชื่อรายการสำเร็จ!");
                    }
                }
            } catch (err) {
                console.log("Fetch title failed", err);
            } finally {
                nameInput.placeholder = "ชื่อรายการ (ดึงให้อัตโนมัติ)";
            }
        }, 600);
    });

    function detectPlatform(rawUrl) {
        let u;
        try { u = new URL(rawUrl); } catch (e) { return 'other'; }
        const host = u.hostname.replace(/^www\./i, '').toLowerCase();

        if (host.includes('tiktok.com')) return 'tiktok';
        if (host.includes('instagram.com')) return 'instagram';
        if (host.includes('twitter.com') || host.includes('x.com')) return 'twitter';
        if (host.includes('facebook.com') || host.includes('fb.com')) return 'facebook';
        if (host.includes('youtube.com') || host.includes('youtu.be')) return 'youtube';
        if (host.includes('github.com')) return 'github';
        
        return 'other';
    }

    function detectSocialProfile(rawUrl) {
        let u;
        try { u = new URL(rawUrl); } catch (e) { return null; }

        const host = u.hostname.replace(/^www\./i, '').toLowerCase();
        const parts = u.pathname.split('/').filter(Boolean);
        if (parts.length === 0) return null;

        const clean = (s) => s ? s.replace(/^@/, '').split('?')[0].split('#')[0] : null;
        const nonUserPaths = new Set(['home', 'explore', 'search', 'i', 'watch', 'channel', 'c', 'p', 'reel', 'reels', 'stories', 'photo', 'video', 'videos', 'status', 'in', 'company', 'groups', 'sharer', 'share']);

        if (host === 'twitter.com' || host === 'x.com') {
            const uname = clean(parts[0]);
            if (uname && !nonUserPaths.has(uname.toLowerCase())) return { platform: 'twitter', username: uname };
        }
        if (host === 'github.com') {
            const uname = clean(parts[0]);
            if (uname) return { platform: 'github', username: uname };
        }
        if (host === 'instagram.com') {
            const uname = clean(parts[0]);
            if (uname && !nonUserPaths.has(uname.toLowerCase())) return { platform: 'instagram', username: uname };
        }
        if (host === 'youtube.com') {
            if (parts[0] && parts[0].startsWith('@')) return { platform: 'youtube', username: clean(parts[0]) };
            if (parts[0] === 'c' && parts[1]) return { platform: 'youtube', username: clean(parts[1]) };
        }
        if (host === 'facebook.com' || host === 'fb.com') {
            const uname = clean(parts[0]);
            if (uname && !nonUserPaths.has(uname.toLowerCase())) return { platform: 'facebook', username: uname };
        }
        if (host === 'tiktok.com') {
            const uname = clean(parts[0]);
            if (uname && uname.startsWith('@')) return { platform: 'tiktok', username: clean(uname) };
            if (uname) return { platform: 'tiktok', username: uname };
        }

        return null;
    }

    function getAvatarChain(url, customImg) {
        const chain = [];
        if (customImg && customImg.trim() !== "") {
            chain.push({ src: customImg.trim(), isProfile: true });
        }
        const social = detectSocialProfile(url);
        if (social) {
            chain.push({ src: `https://unavatar.io/${social.platform}/${social.username}`, isProfile: true });
        }
        try {
            const host = new URL(url).hostname;
            chain.push({ src: `https://www.google.com/s2/favicons?domain=${host}&sz=128`, isProfile: false });
        } catch (e) { /* ignore */ }
        try {
            const host = new URL(url).hostname;
            chain.push({ src: `https://icons.duckduckgo.com/ip3/${host}.ico`, isProfile: false });
        } catch (e) { /* ignore */ }

        return chain;
    }

    function renderAvatar(containerEl, badgeEl, chain, name) {
        containerEl.innerHTML = "";
        let step = 0;

        const tryNext = () => {
            if (step >= chain.length) {
                const initial = (name || 'V').trim().charAt(0);
                const initialEl = document.createElement('div');
                initialEl.className = 'avatar-initial';
                initialEl.textContent = initial;
                containerEl.appendChild(initialEl);
                if (badgeEl) badgeEl.parentElement.classList.remove('has-profile');
                return;
            }

            const imgEl = document.createElement('img');
            imgEl.className = 'avatar-img';
            imgEl.src = chain[step].src;
            imgEl.dataset.isProfile = chain[step].isProfile ? '1' : '0';

            imgEl.onerror = () => {
                step += 1;
                tryNext();
            };

            imgEl.onload = () => {
                containerEl.appendChild(imgEl);
                if (badgeEl) {
                    badgeEl.parentElement.classList.toggle('has-profile', imgEl.dataset.isProfile === '1');
                }
            };
        };

        tryNext();
    }

    // --------------------------------------------------------

    document.getElementById('addBtn').onclick = async () => {
        const name = document.getElementById('name').value.trim();
        let url = document.getElementById('url').value.trim();
        const tag = document.getElementById('tagInput').value.trim() || "ทั่วไป";
        const iconUrl = document.getElementById('customImgInput').value.trim();

        if (!name || !url) return showToast("⚠️ กรอกให้ครบ");

        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

        try {
            if (editingId) {
                await updateDoc(doc(db, "links", editingId), { name, url, tag, iconUrl });
                showToast("อัปเดตเรียบร้อย ✏️");
                resetForm();
            } else {
                await addDoc(collection(db, "links"), { name, url, tag, iconUrl, clicks: 0 });
                resetForm();
                showToast("บันทึกแล้ว ✨");
            }
        } catch (e) {
            console.error(e);
            showToast("❌ บันทึกไม่สำเร็จ");
        }
    };

    function resetForm() {
        editingId = null;
        document.getElementById('name').value = '';
        document.getElementById('url').value = '';
        document.getElementById('tagInput').value = '';
        document.getElementById('customImgInput').value = '';
        
        const addBtn = document.getElementById('addBtn');
        addBtn.textContent = "บันทึก";
        addBtn.classList.remove('edit-btn-active');
        document.getElementById('mainContainer').classList.remove('edit-mode');
        document.getElementById('formHeader').textContent = "⚡ Varp Lnk Pro";
    }

    document.getElementById('clearInputBtn').onclick = resetForm;

    document.getElementById('searchBox').oninput = (e) => {
        searchTerm = e.target.value.toLowerCase();
        renderList();
    };

    onSnapshot(collection(db, "links"), (snapshot) => {
        allLinks = [];
        snapshot.forEach(d => {
            const data = d.data();
            allLinks.push({ 
                id: d.id, 
                ...data,
                platform: detectPlatform(data.url)
            });
        });
        allLinks.sort((a, b) => (b.clicks || 0) - (a.clicks || 0));
        renderPlatforms();
        renderTags();
        renderList();
    }, (err) => {
        console.error(err);
        showToast("❌ โหลดข้อมูลไม่สำเร็จ");
    });

    function renderPlatforms() {
        const platformBar = document.getElementById('platformBar');
        platformBar.innerHTML = "";
        
        const platforms = ["ทั้งหมด", ...new Set(allLinks.map(l => l.platform))];
        platforms.forEach(p => {
            const el = document.createElement('div');
            el.className = 'tag-filter platform-filter' + (activePlatform === p ? ' active' : '');
            el.textContent = p === "ทั้งหมด" ? "✨ ทั้งหมด" : (PLATFORM_ICONS[p] || p);
            el.addEventListener('click', () => {
                activePlatform = p;
                renderPlatforms();
                renderList();
            });
            platformBar.appendChild(el);
        });
    }

    function renderTags() {
        const tagBar = document.getElementById('tagBar');
        tagBar.innerHTML = "";
        const tags = ["ทั้งหมด", ...new Set(allLinks.map(l => l.tag).filter(t => t && t !== "undefined"))];
        tags.forEach(t => {
            const el = document.createElement('div');
            el.className = 'tag-filter' + (activeTag === t ? ' active' : '');
            el.textContent = t;
            el.addEventListener('click', () => {
                activeTag = t;
                renderTags();
                renderList();
            });
            tagBar.appendChild(el);
        });
    }

    // 3D Holographic Tilt Animation Effect
    function apply3DTilt(card) {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -12;
            const rotateY = ((x - centerX) / centerX) * 12;
            
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });

        // Touch Friendly Tilt for Mobile
        card.addEventListener('touchstart', () => {
            card.style.transform = `scale3d(0.98, 0.98, 0.98)`;
        });
        card.addEventListener('touchend', () => {
            card.style.transform = `scale3d(1, 1, 1)`;
        });
    }

    function renderList() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";

        const filtered = allLinks.filter(l => {
            const name = (l.name || '').toLowerCase();
            const tag = (l.tag || '').toLowerCase();
            const matchesSearch = !searchTerm || name.includes(searchTerm) || tag.includes(searchTerm);
            const matchesTag = activeTag === "ทั้งหมด" || l.tag === activeTag;
            const matchesPlatform = activePlatform === "ทั้งหมด" || l.platform === activePlatform;
            return matchesSearch && matchesTag && matchesPlatform;
        });

        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'link-item';
            card.dataset.platform = item.platform || 'other';
            card.style.animationDelay = `${index * 0.05}s`;

            apply3DTilt(card); // ใส่เอฟเฟกต์ 3D Tilt

            const displayTag = (!item.tag || item.tag === "undefined") ? "ทั่วไป" : item.tag;
            const clickCount = item.clicks || 0;

            const clickBadge = document.createElement('div');
            clickBadge.className = 'click-badge';
            clickBadge.textContent = `🖱️ ${clickCount}`;
            card.appendChild(clickBadge);

            const header = document.createElement('div');
            header.style.cssText = 'display:flex; align-items:center; gap:12px;';

            const avatarWrap = document.createElement('div');
            avatarWrap.className = 'avatar-wrap';

            const badge = document.createElement('div');
            badge.className = 'avatar-badge';
            badge.title = 'รูปโปรไฟล์จริง';
            avatarWrap.appendChild(badge);

            renderAvatar(avatarWrap, badge, getAvatarChain(item.url, item.iconUrl), item.name);

            const textWrap = document.createElement('div');
            textWrap.style.cssText = 'overflow:hidden; flex:1;';
            const nameEl = document.createElement('b');
            nameEl.style.cssText = 'white-space:nowrap; text-overflow:ellipsis; overflow:hidden; display:block; font-size:15px;';
            nameEl.title = item.name || '';
            nameEl.textContent = item.name || '';
            
            const badgesWrap = document.createElement('div');
            badgesWrap.className = 'badges-wrap';

            const tagEl = document.createElement('span');
            tagEl.className = 'tag-label';
            tagEl.textContent = displayTag;

            const platformEl = document.createElement('span');
            platformEl.className = 'platform-label';
            platformEl.textContent = (PLATFORM_ICONS[item.platform] || item.platform).replace(/^[^\s]+\s/, '');

            badgesWrap.appendChild(tagEl);
            badgesWrap.appendChild(platformEl);

            textWrap.appendChild(nameEl);
            textWrap.appendChild(badgesWrap);

            header.appendChild(avatarWrap);
            header.appendChild(textWrap);
            card.appendChild(header);

            // action buttons
            const actions = document.createElement('div');
            actions.className = 'action-btns';

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'คัดลอก';
            copyBtn.addEventListener('click', () => copyLink(item.url));

            const editBtn = document.createElement('button');
            editBtn.className = 'edit-btn';
            editBtn.textContent = 'แก้ไข';
            editBtn.addEventListener('click', () => editLink(item));

            const qrBtn = document.createElement('button');
            qrBtn.className = 'qr-btn';
            qrBtn.textContent = 'QR';
            qrBtn.addEventListener('click', () => showQrModal(item.name, item.url));

            const delBtn = document.createElement('button');
            delBtn.className = 'del-btn';
            delBtn.textContent = 'ลบ';
            delBtn.addEventListener('click', () => deleteLink(item.id));

            const openBtn = document.createElement('button');
            openBtn.className = 'open-btn';
            openBtn.textContent = 'เปิด';
            openBtn.addEventListener('click', () => openAndTrack(item.id, item.url));

            actions.appendChild(copyBtn);
            actions.appendChild(editBtn);
            actions.appendChild(qrBtn);
            actions.appendChild(delBtn);
            actions.appendChild(openBtn);
            card.appendChild(actions);

            listDiv.appendChild(card);
        });
    }

    function editLink(item) {
        editingId = item.id;
        document.getElementById('name').value = item.name || '';
        document.getElementById('url').value = item.url || '';
        document.getElementById('tagInput').value = item.tag || '';
        document.getElementById('customImgInput').value = item.iconUrl || '';

        const addBtn = document.getElementById('addBtn');
        addBtn.textContent = "อัปเดต";
        addBtn.classList.add('edit-btn-active');
        document.getElementById('mainContainer').classList.add('edit-mode');
        document.getElementById('formHeader').textContent = "✏️ แก้ไขรายการ";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showQrModal(name, url) {
        const modal = document.getElementById('qrModal');
        document.getElementById('qrTitle').textContent = name;
        document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
        modal.classList.add('show');
    }

    document.getElementById('closeQrBtn').onclick = () => {
        document.getElementById('qrModal').classList.remove('show');
    };

    async function openAndTrack(id, url) {
        window.open(url, '_blank');
        try {
            await updateDoc(doc(db, "links", id), { clicks: increment(1) });
        } catch (e) {
            console.error(e);
        }
    }

    function copyLink(t) {
        navigator.clipboard.writeText(t);
        showToast("📋 คัดลอกแล้ว!");
    }

    async function deleteLink(id) {
        if (!confirm("ลบรายการนี้?")) return;
        try {
            await deleteDoc(doc(db, "links", id));
            if (editingId === id) resetForm();
        } catch (e) {
            console.error(e);
            showToast("❌ ลบไม่สำเร็จ");
        }
    }
</script>
</body>
